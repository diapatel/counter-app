<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Counter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F0D13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Counter">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Display:wght@300;400&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0D13;
    --surface: #1C1B1F;
    --surface2: #2B2930;
    --primary: #D0BCFF;
    --primary-dim: #6650A4;
    --on-primary: #381E72;
    --text: #E6E1E5;
    --text-dim: #9A8FB0;
    --text-faint: #49454F;
    --border: #3a3640;
    --green: #4CAF50;
    --red: #CF6679;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  body { font-family: 'Google Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

  /* SCREENS */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s; }
  .screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .screen.slide-left { transform: translateX(-30%); opacity: 0; pointer-events: none; }

  /* TOP BAR */
  .top-bar { display: flex; align-items: center; padding: 48px 8px 8px; flex-shrink: 0; gap: 4px; background: var(--bg); }
  .top-bar-title { font-family: 'Google Sans', sans-serif; font-size: 22px; font-weight: 400; flex: 1; padding-left: 4px; color: var(--text); }
  .icon-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-dim); position: relative; overflow: hidden; transition: background 0.15s; flex-shrink: 0; }
  .icon-btn:active { background: rgba(208,188,255,0.12); }
  .icon-btn svg { width: 22px; height: 22px; }

  /* ── LIST SCREEN ── */
  #listScreen { background: var(--bg); }
  .counter-list { flex: 1; overflow-y: auto; padding: 8px 16px 100px; display: flex; flex-direction: column; gap: 12px; }
  .counter-list::-webkit-scrollbar { display: none; }

  .counter-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: background 0.15s;
  }
  .counter-card:active { background: #252330; }
  .counter-card-info { flex: 1; min-width: 0; }
  .counter-card-name { font-size: 16px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .counter-card-sub { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
  .counter-card-count { font-family: 'Google Sans Display', sans-serif; font-size: 40px; font-weight: 300; color: var(--primary); letter-spacing: -1px; line-height: 1; flex-shrink: 0; }
  .today-badge { display: inline-block; background: rgba(208,188,255,0.12); color: var(--primary); border-radius: 100px; padding: 2px 8px; font-size: 11px; font-weight: 500; margin-top: 4px; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-faint); padding-bottom: 80px; }
  .empty-state svg { width: 56px; height: 56px; opacity: 0.3; }
  .empty-state p { font-size: 15px; }

  /* FAB */
  .fab { position: fixed; bottom: 28px; right: 24px; width: 64px; height: 64px; border-radius: 20px; background: var(--primary); color: var(--on-primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 20; transition: transform 0.15s; }
  .fab:active { transform: scale(0.94); }
  .fab svg { width: 28px; height: 28px; }

  /* ── COUNTER SCREEN ── */
  #counterScreen { background: var(--bg); }
  .counter-top { display: flex; align-items: center; padding: 48px 8px 0; flex-shrink: 0; }
  .counter-name-display { flex: 1; font-size: 18px; font-weight: 500; color: var(--text); padding-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .counter-name-display:active { opacity: 0.7; }

  .tap-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; }
  .ripple-container { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .ripple { position: absolute; border-radius: 50%; background: rgba(208,188,255,0.1); transform: scale(0); animation: ripple-out 0.6s ease-out forwards; pointer-events: none; }
  @keyframes ripple-out { to { transform: scale(1); opacity: 0; } }
  .count-label { font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }
  .count-number { font-family: 'Google Sans Display', sans-serif; font-size: clamp(80px, 28vw, 150px); font-weight: 300; color: var(--text); line-height: 1; letter-spacing: -4px; position: relative; z-index: 2; transition: transform 0.12s; }
  .count-number.pop { animation: pop 0.18s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { 0% { transform: scale(1); } 45% { transform: scale(1.08); } 100% { transform: scale(1); } }
  .fly-number { position: absolute; font-family: 'Google Sans Display', sans-serif; font-size: 26px; font-weight: 400; color: var(--primary); pointer-events: none; z-index: 5; animation: fly-up 0.65s ease-out forwards; }
  @keyframes fly-up { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-70px) scale(0.7); } }
  .count-today { font-size: 13px; color: var(--text-dim); margin-top: 14px; z-index: 2; }
  .count-today strong { color: var(--primary); }

  .counter-bottom { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px 36px; flex-shrink: 0; }
  .bottom-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 8px 16px; border-radius: 16px; border: none; background: transparent; color: var(--text-dim); transition: background 0.15s, color 0.15s; }
  .bottom-btn:active { background: rgba(208,188,255,0.1); color: var(--primary); }
  .bottom-btn svg { width: 22px; height: 22px; }
  .bottom-btn span { font-size: 11px; font-weight: 500; }

  /* ── CALENDAR SCREEN ── */
  #calendarScreen { background: var(--bg); }
  .cal-header { padding: 16px 20px 12px; flex-shrink: 0; }
  .cal-counter-name { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .cal-subtitle { font-size: 13px; color: var(--text-dim); }

  .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 8px 8px; flex-shrink: 0; }
  .cal-month { font-size: 16px; font-weight: 500; color: var(--text); }
  .cal-nav-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .cal-nav-btn:active { background: rgba(208,188,255,0.12); }
  .cal-nav-btn svg { width: 20px; height: 20px; }

  .cal-grid-header { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 16px; flex-shrink: 0; }
  .cal-day-label { text-align: center; font-size: 11px; font-weight: 500; color: var(--text-faint); padding: 6px 0; letter-spacing: 0.5px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 16px; gap: 4px; flex-shrink: 0; }
  .cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: background 0.15s; position: relative; gap: 2px; }
  .cal-cell:active { background: rgba(208,188,255,0.1); }
  .cal-cell.empty { pointer-events: none; }
  .cal-cell.today .cal-date { background: var(--primary); color: var(--on-primary); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .cal-date { font-size: 13px; font-weight: 400; color: var(--text-dim); line-height: 1; }
  .cal-cell.has-count .cal-date { color: var(--text); font-weight: 500; }
  .cal-count-dot { font-size: 10px; font-weight: 600; color: var(--primary); line-height: 1; }
  .cal-cell.high-count { background: rgba(208,188,255,0.08); }
  .cal-cell.high-count .cal-date { color: var(--primary); }

  .cal-selected-day { margin: 16px 16px 0; background: var(--surface); border-radius: 16px; padding: 16px 20px; flex-shrink: 0; border: 1px solid var(--border); min-height: 80px; }
  .cal-selected-title { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  .cal-selected-count { font-family: 'Google Sans Display', sans-serif; font-size: 48px; font-weight: 300; color: var(--primary); letter-spacing: -1px; line-height: 1; }
  .cal-selected-label { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

  .cal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px 24px; flex-shrink: 0; }
  .cal-stat { background: var(--surface); border-radius: 16px; padding: 14px 16px; border: 1px solid var(--border); }
  .cal-stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .cal-stat-val { font-family: 'Google Sans Display', sans-serif; font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.5px; }
  .cal-stat-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

  /* ── MODAL ── */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: flex; align-items: flex-end; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  .modal-backdrop.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface2); border-radius: 28px 28px 0 0; padding: 24px 24px 48px; width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
  .modal-backdrop.show .modal { transform: translateY(0); }
  .modal-title { font-size: 18px; font-weight: 500; margin-bottom: 20px; color: var(--text); }
  .modal-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 16px; color: var(--text); font-family: 'Google Sans', sans-serif; outline: none; transition: border-color 0.2s; }
  .modal-input:focus { border-color: var(--primary); }
  .modal-input::placeholder { color: var(--text-faint); }
  .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
  .modal-btn { flex: 1; padding: 14px; border-radius: 100px; border: none; cursor: pointer; font-size: 15px; font-weight: 500; font-family: 'Google Sans', sans-serif; transition: background 0.15s; }
  .modal-btn.cancel { background: var(--surface); color: var(--text-dim); }
  .modal-btn.confirm { background: var(--primary); color: var(--on-primary); }
  .modal-btn:active { opacity: 0.8; }

  /* ── SNACKBAR ── */
  .snackbar { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2B2930; border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 14px; color: var(--text-dim); white-space: nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; }
  .snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ LIST SCREEN ══ -->
<div class="screen" id="listScreen">
  <div class="top-bar">
    <span class="top-bar-title">Counters</span>
    <button class="icon-btn" onclick="openDeleteMode()" title="Edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </div>
  <div class="counter-list" id="counterList"></div>
  <button class="fab" onclick="openNewCounterModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- ══ COUNTER SCREEN ══ -->
<div class="screen hidden" id="counterScreen">
  <div class="counter-top">
    <button class="icon-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
    </button>
    <div class="counter-name-display" id="activeCounterName" onclick="openRenameModal()"></div>
    <button class="icon-btn" onclick="openCalendar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </button>
  </div>

  <div class="tap-zone" id="tapZone">
    <div class="ripple-container" id="rippleContainer"></div>
    <div class="count-label">COUNT</div>
    <div class="count-number" id="countNum">0</div>
    <div class="count-today" id="countToday">Today: <strong>0</strong></div>
  </div>

  <div class="counter-bottom">
    <button class="bottom-btn" onclick="undoTap()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
      <span>Undo</span>
    </button>
    <button class="bottom-btn" onclick="openCalendar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Calendar</span>
    </button>
    <button class="bottom-btn" onclick="resetActive()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      <span>Reset</span>
    </button>
  </div>
</div>

<!-- ══ CALENDAR SCREEN ══ -->
<div class="screen hidden" id="calendarScreen">
  <div class="top-bar" style="padding-bottom:0">
    <button class="icon-btn" onclick="closeCalendar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
    </button>
    <div class="cal-header" style="padding:0 8px 0 4px; flex:1">
      <div class="cal-counter-name" id="calCounterName"></div>
      <div class="cal-subtitle">Daily history</div>
    </div>
  </div>

  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="changeMonth(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="cal-month" id="calMonth"></span>
    <button class="cal-nav-btn" onclick="changeMonth(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div class="cal-grid-header">
    <div class="cal-day-label">S</div><div class="cal-day-label">M</div><div class="cal-day-label">T</div>
    <div class="cal-day-label">W</div><div class="cal-day-label">T</div><div class="cal-day-label">F</div><div class="cal-day-label">S</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>

  <div class="cal-selected-day" id="calSelectedDay">
    <div class="cal-selected-title">Select a day to see details</div>
  </div>

  <div class="cal-stats" id="calStats"></div>
</div>

<!-- ══ MODALS ══ -->
<div class="modal-backdrop" id="newCounterModal">
  <div class="modal">
    <div class="modal-title">New Counter</div>
    <input class="modal-input" id="newCounterInput" placeholder="Counter name (e.g. Water, Steps…)" maxlength="30">
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('newCounterModal')">Cancel</button>
      <button class="modal-btn confirm" onclick="createCounter()">Create</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="renameModal">
  <div class="modal">
    <div class="modal-title">Rename Counter</div>
    <input class="modal-input" id="renameInput" placeholder="Counter name" maxlength="30">
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('renameModal')">Cancel</button>
      <button class="modal-btn confirm" onclick="renameCounter()">Save</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="deleteModal">
  <div class="modal">
    <div class="modal-title" id="deleteModalTitle">Delete counter?</div>
    <div style="color:var(--text-dim);font-size:14px;line-height:1.5">This will permanently remove all history for this counter.</div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="modal-btn confirm" style="background:var(--red);color:#fff" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="snackbar" id="snackbar"></div>

<script>
// ── DATA ──
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadData() {
  try { return JSON.parse(localStorage.getItem('counters_v2')) || []; } catch { return []; }
}
function saveData() {
  localStorage.setItem('counters_v2', JSON.stringify(counters));
}

let counters = loadData();
// seed example if empty
if (counters.length === 0) {
  counters = [{ id: Date.now(), name: 'My Counter', total: 0, days: {}, tapHistory: [] }];
  saveData();
}

let activeId = null;
let calViewDate = new Date();
let calSelectedDate = null;
let pendingDeleteId = null;
let snackTimer;

// ── HELPERS ──
function getCounter(id) { return counters.find(c => c.id === id); }
function getTodayCount(c) { return (c.days[todayKey()] || 0); }

function showSnack(msg) {
  const s = document.getElementById('snackbar');
  s.textContent = msg;
  s.classList.add('show');
  clearTimeout(snackTimer);
  snackTimer = setTimeout(() => s.classList.remove('show'), 2200);
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('slide-left');
    s.classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function goBack() { showScreen('listScreen'); renderList(); }
function closeCalendar() { showScreen('counterScreen'); }

// ── LIST ──
function renderList() {
  const list = document.getElementById('counterList');
  if (counters.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>Tap + to create a counter</p>
    </div>`;
    return;
  }
  list.innerHTML = counters.map(c => {
    const today = getTodayCount(c);
    return `<div class="counter-card" onclick="openCounter(${c.id})">
      <div class="counter-card-info">
        <div class="counter-card-name">${escHtml(c.name)}</div>
        <div class="counter-card-sub">All time: ${c.total.toLocaleString()}</div>
        ${today > 0 ? `<div class="today-badge">Today: ${today}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div class="counter-card-count">${c.total.toLocaleString()}</div>
        <button onclick="event.stopPropagation();openDeletePrompt(${c.id})" style="background:transparent;border:none;cursor:pointer;color:var(--text-faint);padding:4px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── OPEN COUNTER ──
function openCounter(id) {
  activeId = id;
  const c = getCounter(id);
  document.getElementById('activeCounterName').textContent = c.name;
  document.getElementById('countNum').textContent = c.total.toLocaleString();
  updateTodayLabel();
  showScreen('counterScreen');
  setupTapZone();
}

function updateTodayLabel() {
  const c = getCounter(activeId);
  const t = getTodayCount(c);
  document.getElementById('countToday').innerHTML = `Today: <strong>${t}</strong>`;
}

// ── TAP ZONE ──
function setupTapZone() {
  const zone = document.getElementById('tapZone');
  zone.onclick = null;
  zone.ontouchend = null;
  zone.addEventListener('click', handleTap);
  zone.addEventListener('touchend', function(e) { e.preventDefault(); handleTap(e); }, { passive: false });
}

function handleTap(e) {
  if (e.target.closest('button')) return;
  const x = e.touches ? e.changedTouches[0].clientX : e.clientX;
  const y = e.touches ? e.changedTouches[0].clientY : e.clientY;
  const c = getCounter(activeId);
  c.tapHistory.push(c.total);
  c.total++;
  c.days[todayKey()] = (c.days[todayKey()] || 0) + 1;
  saveData();
  document.getElementById('countNum').textContent = c.total.toLocaleString();
  updateTodayLabel();
  popNum();
  spawnRipple(x, y);
  spawnFly(x, y);
}

function undoTap() {
  const c = getCounter(activeId);
  if (!c.tapHistory.length) { showSnack('Nothing to undo'); return; }
  const prev = c.tapHistory.pop();
  const diff = c.total - prev;
  c.total = prev;
  const tk = todayKey();
  c.days[tk] = Math.max(0, (c.days[tk] || 0) - diff);
  if (c.days[tk] === 0) delete c.days[tk];
  saveData();
  document.getElementById('countNum').textContent = c.total.toLocaleString();
  updateTodayLabel();
  popNum();
}

function resetActive() {
  const c = getCounter(activeId);
  if (c.total === 0) return;
  c.tapHistory = [];
  c.total = 0;
  const tk = todayKey();
  delete c.days[tk];
  saveData();
  document.getElementById('countNum').textContent = '0';
  updateTodayLabel();
  popNum();
  showSnack('Counter reset');
}

function popNum() {
  const el = document.getElementById('countNum');
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function spawnRipple(x, y) {
  const c = document.getElementById('rippleContainer');
  const size = Math.max(window.innerWidth, window.innerHeight) * 2.2;
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = `width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px`;
  c.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function spawnFly(x, y) {
  const el = document.createElement('div');
  el.className = 'fly-number';
  el.textContent = '+1';
  el.style.left = (x - 16) + 'px';
  el.style.top = (y - 16) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ── CALENDAR ──
function openCalendar() {
  const c = getCounter(activeId);
  document.getElementById('calCounterName').textContent = c.name;
  calViewDate = new Date();
  calSelectedDate = todayKey();
  renderCalendar();
  showScreen('calendarScreen');
}

function changeMonth(dir) {
  calViewDate.setMonth(calViewDate.getMonth() + dir);
  renderCalendar();
}

function renderCalendar() {
  const c = getCounter(activeId);
  const year = calViewDate.getFullYear();
  const month = calViewDate.getMonth();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonth').textContent = `${months[month]} ${year}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = todayKey();

  // find max for heat map
  let maxCount = 0;
  for (let i = 1; i <= daysInMonth; i++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    maxCount = Math.max(maxCount, c.days[key] || 0);
  }

  let html = '';
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;
  for (let i = 1; i <= daysInMonth; i++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const cnt = c.days[key] || 0;
    const isToday = key === today;
    const isSelected = key === calSelectedDate;
    const isHigh = cnt > 0 && maxCount > 0 && cnt >= maxCount * 0.6;
    html += `<div class="cal-cell ${cnt>0?'has-count':''} ${isToday?'today':''} ${isHigh?'high-count':''}" 
      style="${isSelected?'outline:2px solid var(--primary);outline-offset:1px;border-radius:12px':''}"
      onclick="selectCalDay('${key}',${cnt})">
      <div class="cal-date">${i}</div>
      ${cnt > 0 ? `<div class="cal-count-dot">${cnt}</div>` : ''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  if (calSelectedDate) {
    const selCount = c.days[calSelectedDate] || 0;
    showCalDay(calSelectedDate, selCount);
  }
  renderCalStats();
}

function selectCalDay(key, cnt) {
  calSelectedDate = key;
  showCalDay(key, cnt);
  renderCalendar();
}

function showCalDay(key, cnt) {
  const parts = key.split('-');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  const label = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  document.getElementById('calSelectedDay').innerHTML = `
    <div class="cal-selected-title">${label}</div>
    <div class="cal-selected-count">${cnt}</div>
    <div class="cal-selected-label">${cnt === 1 ? 'count' : 'counts'}</div>
  `;
}

function renderCalStats() {
  const c = getCounter(activeId);
  const days = Object.values(c.days).filter(v => v > 0);
  const avg = days.length ? Math.round(days.reduce((a,b) => a+b, 0) / days.length) : 0;
  const best = days.length ? Math.max(...days) : 0;
  const streak = calcStreak(c);
  document.getElementById('calStats').innerHTML = `
    <div class="cal-stat"><div class="cal-stat-label">Daily Avg</div><div class="cal-stat-val">${avg}</div><div class="cal-stat-sub">active days</div></div>
    <div class="cal-stat"><div class="cal-stat-label">Best Day</div><div class="cal-stat-val">${best}</div><div class="cal-stat-sub">single day</div></div>
    <div class="cal-stat"><div class="cal-stat-label">Streak</div><div class="cal-stat-val">${streak}d</div><div class="cal-stat-sub">days in a row</div></div>
    <div class="cal-stat"><div class="cal-stat-label">All Time</div><div class="cal-stat-val">${c.total.toLocaleString()}</div><div class="cal-stat-sub">total</div></div>
  `;
}

function calcStreak(c) {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if ((c.days[key] || 0) > 0) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

// ── MODALS ──
function openNewCounterModal() {
  document.getElementById('newCounterInput').value = '';
  openModal('newCounterModal');
  setTimeout(() => document.getElementById('newCounterInput').focus(), 300);
}

function createCounter() {
  const name = document.getElementById('newCounterInput').value.trim() || 'Counter';
  counters.push({ id: Date.now(), name, total: 0, days: {}, tapHistory: [] });
  saveData();
  closeModal('newCounterModal');
  renderList();
}

function openRenameModal() {
  const c = getCounter(activeId);
  document.getElementById('renameInput').value = c.name;
  openModal('renameModal');
  setTimeout(() => document.getElementById('renameInput').focus(), 300);
}

function renameCounter() {
  const name = document.getElementById('renameInput').value.trim();
  if (!name) return;
  getCounter(activeId).name = name;
  saveData();
  document.getElementById('activeCounterName').textContent = name;
  closeModal('renameModal');
}

function openDeleteMode() { showSnack('Tap 🗑 on a counter to delete it'); }

function openDeletePrompt(id) {
  pendingDeleteId = id;
  const c = getCounter(id);
  document.getElementById('deleteModalTitle').textContent = `Delete "${c.name}"?`;
  openModal('deleteModal');
}

function confirmDelete() {
  counters = counters.filter(c => c.id !== pendingDeleteId);
  saveData();
  closeModal('deleteModal');
  renderList();
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.modal-backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('show'); });
});

// Enter key on inputs
document.getElementById('newCounterInput').addEventListener('keydown', e => { if (e.key === 'Enter') createCounter(); });
document.getElementById('renameInput').addEventListener('keydown', e => { if (e.key === 'Enter') renameCounter(); });

// ── INIT ──
renderList();
showScreen('listScreen');
</script>
