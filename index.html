<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0D13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Display:wght@300;400&family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0D13;
  --surface: #1C1B1F;
  --surface2: #28263C;
  --primary: #D0BCFF;
  --primary-dim: #6650A4;
  --on-primary: #21005D;
  --text: #E6E1E5;
  --text-dim: #9A8FB0;
  --text-faint: #49454F;
  --border: #2E2B3A;
  --red: #CF6679;
  --green: #81C784;
  --safe: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'Google Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s;
  will-change: transform;
}
.screen.off-right { transform: translateX(100%); pointer-events: none; }
.screen.off-left  { transform: translateX(-25%); opacity: 0.4; pointer-events: none; }

/* ── SHARED TOP BAR ── */
.top-bar {
  display: flex;
  align-items: center;
  padding: 52px 4px 4px;
  flex-shrink: 0;
  min-height: 104px;
  gap: 0;
}
.top-bar-title {
  flex: 1;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.3px;
  padding: 0 8px;
  color: var(--text);
  line-height: 1.2;
  word-break: break-word;
}
.icon-btn {
  width: 52px; height: 52px;
  min-width: 52px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  position: relative; overflow: hidden;
  transition: background 0.15s;
}
.icon-btn:active { background: rgba(208,188,255,0.14); }
.icon-btn svg { width: 24px; height: 24px; pointer-events: none; }

/* ── LIST SCREEN ── */
#listScreen { background: var(--bg); }

.list-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 8px 16px calc(96px + var(--safe));
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.list-scroll::-webkit-scrollbar { display: none; }

.counter-row {
  background: var(--surface);
  border-radius: 20px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: background 0.12s, transform 0.1s;
  min-height: 80px;
  position: relative;
  overflow: hidden;
}
.counter-row:active { background: #252232; transform: scale(0.985); }
.row-info { flex: 1; min-width: 0; }
.row-name {
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  word-break: break-word;
}
.row-meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.today-pill {
  background: rgba(208,188,255,0.14);
  color: var(--primary);
  border-radius: 100px;
  padding: 2px 9px;
  font-size: 11px;
  font-weight: 600;
}
.row-total {
  font-family: 'Google Sans Display', sans-serif;
  font-size: 36px;
  font-weight: 300;
  color: var(--primary);
  letter-spacing: -1px;
  line-height: 1;
  flex-shrink: 0;
  min-width: 56px;
  text-align: right;
}
.row-delete {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none; background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-faint);
  flex-shrink: 0;
  transition: color 0.15s, background 0.15s;
}
.row-delete:active { color: var(--red); background: rgba(207,102,121,0.1); }
.row-delete svg { width: 18px; height: 18px; pointer-events: none; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--text-faint);
  padding-bottom: 100px;
}
.empty-state svg { width: 64px; height: 64px; opacity: 0.25; }
.empty-state p { font-size: 16px; }

/* ── TILE GRID VIEW ── */
.tile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 8px 16px calc(96px + var(--safe));
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  flex: 1;
}
.tile-grid::-webkit-scrollbar { display: none; }

.counter-tile {
  background: var(--surface);
  border-radius: 24px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 12px 14px;
  gap: 6px;
  position: relative;
  overflow: hidden;
  min-height: 170px;
  cursor: pointer;
  transition: background 0.12s, transform 0.1s;
}
.counter-tile:active { background: #252232; transform: scale(0.97); }
.tile-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
  width: 100%;
}
.tile-count {
  font-family: 'Google Sans Display', sans-serif;
  font-size: clamp(40px, 12vw, 56px);
  font-weight: 300;
  color: var(--text);
  letter-spacing: -2px;
  line-height: 1;
  flex: 1;
  display: flex;
  align-items: center;
}
.tile-today {
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 500;
}
.tile-today strong { color: var(--primary); }
.tile-actions {
  display: flex;
  gap: 8px;
  width: 100%;
  margin-top: 4px;
}
.tile-btn {
  flex: 1;
  height: 40px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, transform 0.1s;
  font-size: 22px;
  font-weight: 300;
}
.tile-btn:active { transform: scale(0.92); }
.tile-btn.minus { background: rgba(207,102,121,0.15); color: var(--red); }
.tile-btn.minus:active { background: rgba(207,102,121,0.28); }
.tile-btn.plus  { background: rgba(208,188,255,0.15); color: var(--primary); }
.tile-btn.plus:active  { background: rgba(208,188,255,0.28); }

/* view toggle buttons */
.view-toggle {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border-radius: 12px;
  padding: 4px;
  margin-right: 4px;
}
.vtoggle-btn {
  width: 36px; height: 36px;
  border-radius: 9px;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-faint);
  transition: background 0.15s, color 0.15s;
}
.vtoggle-btn.active { background: var(--primary-dim); color: var(--primary); }
.vtoggle-btn svg { width: 18px; height: 18px; pointer-events: none; }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(28px + var(--safe));
  right: 24px;
  width: 64px; height: 64px;
  border-radius: 20px;
  border: none;
  background: var(--primary);
  color: var(--on-primary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(103,80,164,0.5);
  z-index: 20;
  transition: transform 0.12s, box-shadow 0.12s;
}
.fab:active { transform: scale(0.93); box-shadow: 0 2px 12px rgba(103,80,164,0.4); }
.fab svg { width: 30px; height: 30px; }

/* ── COUNTER SCREEN ── */
#counterScreen { background: var(--bg); }

.counter-top {
  display: flex;
  align-items: flex-start;
  padding: 52px 4px 0;
  flex-shrink: 0;
  gap: 0;
}
.counter-name-wrap {
  flex: 1;
  padding: 10px 8px 0;
  cursor: pointer;
  min-width: 0;
}
.counter-name-wrap:active { opacity: 0.6; }
.counter-name-text {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  word-break: break-word;
}
.edit-hint {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 2px;
  letter-spacing: 0.3px;
}

/* TAP ZONE — takes all remaining space */
.tap-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  /* large enough to always fill screen comfortably */
  min-height: 0;
}
.ripple-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(208,188,255,0.09);
  transform: scale(0);
  animation: rout 0.6s ease-out forwards;
  pointer-events: none;
}
@keyframes rout { to { transform: scale(1); opacity: 0; } }

.count-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 10px;
  z-index: 2;
}
.count-number {
  font-family: 'Google Sans Display', sans-serif;
  font-size: clamp(88px, 30vw, 160px);
  font-weight: 300;
  color: var(--text);
  line-height: 1;
  letter-spacing: -4px;
  z-index: 2;
  transition: color 0.2s;
}
.count-number.negative { color: var(--red); }
.count-number.pop { animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.09)} 100%{transform:scale(1)} }

.count-today-label {
  font-size: 14px;
  color: var(--text-dim);
  margin-top: 16px;
  z-index: 2;
}
.count-today-label strong { color: var(--primary); font-weight: 600; }

.fly {
  position: absolute;
  font-family: 'Google Sans Display', sans-serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--primary);
  pointer-events: none;
  z-index: 5;
  animation: flyup 0.65s ease-out forwards;
}
@keyframes flyup { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.65)} }

/* BOTTOM ACTION BAR */
.action-bar {
  display: flex;
  align-items: stretch;
  padding: 0 8px calc(16px + var(--safe)) 8px;
  gap: 6px;
  flex-shrink: 0;
  background: linear-gradient(to top, var(--bg) 80%, transparent);
  padding-top: 12px;
}
.action-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 14px 8px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  color: var(--text-dim);
  transition: background 0.12s, color 0.12s, transform 0.1s;
  min-height: 70px;
}
.action-btn:active { background: #252232; color: var(--primary); transform: scale(0.95); }
.action-btn svg { width: 22px; height: 22px; }
.action-btn span { font-size: 11px; font-weight: 500; letter-spacing: 0.3px; }
.action-btn.primary-btn {
  background: var(--primary);
  color: var(--on-primary);
  border-color: transparent;
  flex: 1.6;
}
.action-btn.primary-btn:active { background: #b8a0e8; color: var(--on-primary); }

/* ── CALENDAR SCREEN ── */
#calendarScreen { background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; }
#calendarScreen::-webkit-scrollbar { display: none; }

.cal-top {
  display: flex;
  align-items: flex-start;
  padding: 52px 4px 0;
  flex-shrink: 0;
}
.cal-title-wrap { flex: 1; padding: 8px 8px 0; }
.cal-counter-name { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.3; word-break: break-word; }
.cal-subtitle { font-size: 12px; color: var(--text-faint); margin-top: 3px; }

.cal-month-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 8px;
  flex-shrink: 0;
}
.cal-month-label { font-size: 17px; font-weight: 600; color: var(--text); }
.cal-nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%; border: none; background: transparent;
  cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}
.cal-nav-btn:active { background: rgba(208,188,255,0.12); }
.cal-nav-btn svg { width: 22px; height: 22px; }

.cal-dow { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 12px; flex-shrink: 0; }
.cal-dow-cell { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-faint); padding: 6px 0; letter-spacing: 0.8px; }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; padding: 4px 12px 0; flex-shrink: 0; }
.cal-cell {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 14px;
  cursor: pointer;
  gap: 1px;
  transition: background 0.12s;
  position: relative;
}
.cal-cell:active { background: rgba(208,188,255,0.1); }
.cal-cell.empty { pointer-events: none; }
.cal-cell-date { font-size: 14px; color: var(--text-dim); line-height: 1; font-weight: 400; }
.cal-cell.has-count .cal-cell-date { color: var(--text); font-weight: 600; }
.cal-cell.is-today .cal-cell-date {
  background: var(--primary); color: var(--on-primary);
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600;
}
.cal-cell-count { font-size: 10px; font-weight: 700; color: var(--primary); line-height: 1; }
.cal-cell.heat-mid { background: rgba(208,188,255,0.07); }
.cal-cell.heat-high { background: rgba(208,188,255,0.15); }
.cal-cell.selected { outline: 2px solid var(--primary); outline-offset: 0px; border-radius: 14px; }

/* Selected day card */
.cal-day-card {
  margin: 16px 16px 0;
  background: var(--surface);
  border-radius: 20px;
  padding: 18px 20px;
  border: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  min-height: 80px;
}
.cal-day-card-info { flex: 1; }
.cal-day-card-date { font-size: 14px; color: var(--text-dim); margin-bottom: 4px; }
.cal-day-card-count {
  font-family: 'Google Sans Display', sans-serif;
  font-size: 48px; font-weight: 300;
  color: var(--primary); letter-spacing: -1.5px; line-height: 1;
}
.cal-day-card-label { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
.cal-day-empty { color: var(--text-faint); font-size: 15px; }

/* Stats grid */
.cal-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 12px 16px calc(32px + var(--safe));
  flex-shrink: 0;
}
.stat-card {
  background: var(--surface); border-radius: 20px;
  padding: 16px 18px; border: 1px solid var(--border);
}
.stat-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
.stat-val { font-family: 'Google Sans Display', sans-serif; font-size: 32px; font-weight: 300; color: var(--text); letter-spacing: -0.5px; line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text-faint); margin-top: 4px; }

/* STEP ROW */
.step-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px 10px;
  flex-shrink: 0;
}
.step-label {
  font-size: 12px;
  color: var(--text-faint);
  font-weight: 500;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.step-chips {
  display: flex;
  gap: 6px;
  flex: 1;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.step-chips::-webkit-scrollbar { display: none; }
.step-chip {
  flex-shrink: 0;
  height: 34px;
  padding: 0 14px;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 500;
  font-family: 'Google Sans', sans-serif;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  white-space: nowrap;
}
.step-chip.active {
  background: var(--primary-dim);
  border-color: var(--primary-dim);
  color: var(--primary);
}
.step-chip:active { opacity: 0.7; }

.count-edit-hint {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 6px;
  z-index: 2;
  letter-spacing: 0.3px;
}

/* STEP DISPLAY on tap zone */
.step-indicator {
  font-size: 13px;
  color: var(--primary);
  font-weight: 600;
  margin-top: 4px;
  z-index: 2;
  background: rgba(208,188,255,0.1);
  border-radius: 100px;
  padding: 3px 12px;
}

/* ── MODALS ── */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 60;
  display: flex; align-items: flex-end;
  opacity: 0; transition: opacity 0.25s;
  pointer-events: none;
}
.backdrop.open { opacity: 1; pointer-events: all; }
.sheet {
  background: #1E1B26;
  border-radius: 28px 28px 0 0;
  padding: 20px 20px calc(24px + var(--safe));
  width: 100%;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.backdrop.open .sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 18px; }
.sheet-input {
  width: 100%; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 14px;
  padding: 16px 18px; font-size: 17px;
  color: var(--text); font-family: 'Google Sans', sans-serif;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
.sheet-input:focus { border-color: var(--primary); }
.sheet-input::placeholder { color: var(--text-faint); }
.sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
.sheet-btn {
  flex: 1; padding: 16px;
  border-radius: 100px; border: none;
  cursor: pointer; font-size: 16px; font-weight: 600;
  font-family: 'Google Sans', sans-serif;
  transition: opacity 0.15s, transform 0.1s;
}
.sheet-btn:active { opacity: 0.8; transform: scale(0.97); }
.sheet-btn.cancel { background: var(--surface); color: var(--text-dim); }
.sheet-btn.confirm { background: var(--primary); color: var(--on-primary); }
.sheet-btn.danger  { background: var(--red);     color: #fff; }
.sheet-danger-text { font-size: 14px; color: var(--text-dim); line-height: 1.5; margin-bottom: 4px; }

/* ── SNACKBAR ── */
.snack {
  position: fixed; bottom: calc(90px + var(--safe)); left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: #2C2A36; border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 20px;
  font-size: 14px; color: var(--text-dim);
  white-space: nowrap;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 55;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.snack.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══════════ LIST SCREEN ══════════ -->
<div class="screen" id="listScreen">
  <div class="top-bar">
    <span class="top-bar-title">Counters</span>
    <div class="view-toggle">
      <button class="vtoggle-btn active" id="vList" onclick="setView('list')" title="List view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="vtoggle-btn" id="vGrid" onclick="setView('grid')" title="Grid view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
    </div>
  </div>

<!-- ══════════ CALENDAR SCREEN ══════════ -->

<!-- ══ MODALS ══ -->

</div>

<div class="backdrop" id="renameSheet" onclick="closeSheet('renameSheet',event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Rename</div>
    <input class="sheet-input" id="renameInput" placeholder="Counter name" autocomplete="off">
    <div class="sheet-actions">
      <button class="sheet-btn cancel" onclick="closeSheet('renameSheet')">Cancel</button>
      <button class="sheet-btn confirm" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<div class="backdrop" id="editCountSheet" onclick="closeSheet('editCountSheet',event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Edit Count</div>
    <input class="sheet-input" id="editCountInput" placeholder="Enter new count" type="number" inputmode="numeric" autocomplete="off">
    <div class="sheet-actions">
      <button class="sheet-btn cancel" onclick="closeSheet('editCountSheet')">Cancel</button>
      <button class="sheet-btn confirm" onclick="saveEditCount()">Set</button>

</div>

  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Custom Step</div>
    <input class="sheet-input" id="customStepInput" placeholder="e.g. 111" type="number" inputmode="numeric" autocomplete="off">
    <div class="sheet-actions">
      <button class="sheet-btn cancel" onclick="closeSheet('customStepSheet')">Cancel</button>
      <button class="sheet-btn confirm" onclick="saveCustomStep()">Set</button>
    </div>
  </div>
</div>

<div class="backdrop" id="deleteSheet" onclick="closeSheet('deleteSheet',event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="deleteSheetTitle">Delete counter?</div>
    <div class="sheet-danger-text">All history for this counter will be permanently removed.</div>
    <div class="sheet-actions">
      <button class="sheet-btn cancel" onclick="closeSheet('deleteSheet')">Cancel</button>
      <button class="sheet-btn danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>

<div class="snack" id="snack"></div>

<script>
// ── VIEW MODE ──
let viewMode = localStorage.getItem('viewMode') || 'list';
let currentStep = 1;

function setView(mode) {
  viewMode = mode;
  localStorage.setItem('viewMode', mode);
  document.getElementById('vList').classList.toggle('active', mode === 'list');
  document.getElementById('vGrid').classList.toggle('active', mode === 'grid');
  document.getElementById('listScroll').style.display = mode === 'list' ? 'flex' : 'none';
  document.getElementById('tileGrid').style.display  = mode === 'grid' ? 'grid' : 'none';
  if (mode === 'list') renderList();
  else renderTiles();
}

// ── DATA ──
const STORE = 'ctrs_v3';
function load() { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } }
function save() { localStorage.setItem(STORE, JSON.stringify(db)); }
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

let db = load();
if (!db.length) {
  db = [{ id: Date.now(), name: 'My Counter', total: 0, days: {}, hist: [] }];
  save();
}

let activeId = null;
let calDate = new Date();
let calSel = null;
let pendingDel = null;
let snackTid;

// ── NAVIGATION ──
let screenStack = ['listScreen'];

function navTo(id) {
  const cur = screenStack[screenStack.length - 1];
  document.getElementById(cur).classList.add('off-left');
  document.getElementById(cur).classList.remove('off-right');
  document.getElementById(id).classList.remove('off-right', 'off-left');
  screenStack.push(id);
}

function navBack() {
  if (screenStack.length <= 1) return;
  const cur = screenStack.pop();
  document.getElementById(cur).classList.add('off-right');
  document.getElementById(cur).classList.remove('off-left');
  const prev = screenStack[screenStack.length - 1];
  document.getElementById(prev).classList.remove('off-left', 'off-right');
  if (prev === 'listScreen') { if (viewMode === 'list') renderList(); else renderTiles(); }
  if (prev === 'counterScreen') refreshCounter();
}

function navCal() {
  const c = getC(activeId);
  document.getElementById('calName').textContent = c.name;
  calDate = new Date();
  calSel = todayKey();
  renderCal();
  navTo('calendarScreen');
}

// ── UTILS ──
function getC(id) { return db.find(c => c.id === id); }
function todayOf(c) { return c.days[todayKey()] || 0; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function snack(msg) {
  const el = document.getElementById('snack');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(snackTid);
  snackTid = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── TILE RENDER ──
function renderTiles() {
  const el = document.getElementById('tileGrid');
  if (!db.length) {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
    el.innerHTML = `<div class="empty-state" style="padding-bottom:100px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>Tap + to add a counter</p></div>`;
    return;
  }
  el.style.display = 'grid';
  el.style.flexDirection = '';
  el.innerHTML = db.map(c => {
    const today = todayOf(c);
    return `<div class="counter-tile" onclick="openCounter(${c.id})">
      <div class="tile-name">${esc(c.name)}</div>
      <div class="tile-count">${c.total.toLocaleString()}</div>
      ${today > 0 ? `<div class="tile-today">Today: <strong>${today}</strong></div>` : '<div class="tile-today">&nbsp;</div>'}
      <div class="tile-actions">
        <button class="tile-btn minus" onclick="event.stopPropagation();tileDecrement(${c.id},this)">−</button>
        <button class="tile-btn plus"  onclick="event.stopPropagation();tileIncrement(${c.id},this)">+</button>
      </div>
    </div>`;
  }).join('');
}

function tileIncrement(id, btn) {
  activeId = id;
  const c = getC(id);
  c.hist.push(c.total);
  if (c.hist.length > 200) c.hist.shift();
  c.total++;
  c.days[todayKey()] = (c.days[todayKey()]||0) + 1;
  save();
  // animate the count in the tile
  const tile = btn.closest('.counter-tile');
  const countEl = tile.querySelector('.tile-count');
  countEl.textContent = c.total.toLocaleString();
  countEl.style.color = 'var(--primary)';
  setTimeout(() => countEl.style.color = '', 200);
  const todayEl = tile.querySelector('.tile-today');
  const t = todayOf(c);
  todayEl.innerHTML = `Today: <strong>${t}</strong>`;
}

function tileDecrement(id, btn) {
  activeId = id;
  const c = getC(id);
  c.hist.push(c.total);
  if (c.hist.length > 200) c.hist.shift();
  c.total--;
  const tk = todayKey();
  c.days[tk] = Math.max(0, (c.days[tk]||0) - 1);
  if (!c.days[tk]) delete c.days[tk];
  save();
  const tile = btn.closest('.counter-tile');
  const countEl = tile.querySelector('.tile-count');
  countEl.textContent = c.total.toLocaleString();
  countEl.style.color = 'var(--red)';
  setTimeout(() => countEl.style.color = '', 200);
  const todayEl = tile.querySelector('.tile-today');
  const t = todayOf(c);
  todayEl.innerHTML = t > 0 ? `Today: <strong>${t}</strong>` : '&nbsp;';
}

// ── LIST RENDER ──
function renderList() {
  const el = document.getElementById('listScroll');
  if (!db.length) {
    el.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>Tap + to add a counter</p></div>`;
    return;
  }
  el.innerHTML = db.map(c => {
    const today = todayOf(c);
    return `<div class="counter-row" onclick="openCounter(${c.id})">
      <div class="row-info">
        <div class="row-name">${esc(c.name)}</div>
        <div class="row-meta">
          <span>All time: ${c.total.toLocaleString()}</span>
          ${today > 0 ? `<span class="today-pill">Today: ${today}</span>` : ''}
        </div>
      </div>
      <div class="row-total">${c.total.toLocaleString()}</div>
      <button class="row-delete" onclick="event.stopPropagation();promptDelete(${c.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`;
  }).join('');
}

// ── OPEN COUNTER ──
function openCounter(id) {
  activeId = id;
  currentStep = 1;
  // reset step chips UI
  document.querySelectorAll('.step-chip').forEach((c,i) => {
    c.classList.remove('active');
    if (i === 0) c.classList.add('active');
  });
  // reset custom chip label
  const chips = document.querySelectorAll('.step-chip');
  chips[chips.length-1].textContent = 'Custom…';
  chips[chips.length-1].onclick = () => openCustomStepSheet();
  document.getElementById('stepIndicator').textContent = '+1 per tap';
  refreshCounter();
  navTo('counterScreen');
  setupTap();
}

function refreshCounter() {
  const c = getC(activeId);
  if (!c) return;
  document.getElementById('ctrName').textContent = c.name;
  document.getElementById('ctrNum').textContent = c.total.toLocaleString();
  document.getElementById('ctrNum').classList.toggle('negative', c.total < 0);
  document.getElementById('ctrToday').innerHTML = `Today: <strong>${todayOf(c)}</strong>`;
}

// ── STEP ──
function setStep(n, btn) {
  currentStep = n;
  document.querySelectorAll('.step-chip').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('stepIndicator').textContent = `+${n} per tap`;
}

function openCustomStepSheet() {
  document.getElementById('customStepInput').value = '';
  document.getElementById('customStepSheet').classList.add('open');
  setTimeout(() => document.getElementById('customStepInput').focus(), 350);
}

function saveCustomStep() {
  const val = parseInt(document.getElementById('customStepInput').value);
  if (!val || val < 1) { snack('Enter a valid number'); return; }
  currentStep = val;
  // deselect all chips, mark custom
  document.querySelectorAll('.step-chip').forEach(c => c.classList.remove('active'));
  const last = document.querySelector('.step-chip:last-child');
  last.textContent = val;
  last.classList.add('active');
  last.onclick = () => setStep(val, last);
  document.getElementById('stepIndicator').textContent = `+${val} per tap`;
  closeSheet('customStepSheet');
}

// ── EDIT COUNT ──
function openEditSheet() {
  const c = getC(activeId);
  document.getElementById('editCountInput').value = c.total;
  document.getElementById('editCountSheet').classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('editCountInput');
    inp.focus();
    inp.select();
  }, 350);
}

function saveEditCount() {
  const val = parseInt(document.getElementById('editCountInput').value);
  if (isNaN(val)) { snack('Enter a valid number'); return; }
  const c = getC(activeId);
  c.hist.push(c.total);
  c.total = val;
  // update today's count to reflect edit (set to val if editing makes sense)
  save();
  refreshCounter();
  pop();
  closeSheet('editCountSheet');
  snack(`Count set to ${val.toLocaleString()}`);
}

// ── TAP ──
function setupTap() {
  const zone = document.getElementById('tapZone');
  zone.onclick = e => { if (!e.target.closest('button')) handleTap(e); };
  zone.ontouchend = e => { e.preventDefault(); if (!e.target.closest('button')) handleTap(e); };
}

function handleTap(e) {
  const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  const y = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
  increment(x, y);
}

function doTap(e) {
  const r = e.currentTarget.getBoundingClientRect();
  increment(r.left + r.width/2, r.top + r.height/2);
}

function increment(x, y) {
  const c = getC(activeId);
  c.hist.push(c.total);
  if (c.hist.length > 200) c.hist.shift();
  c.total += currentStep;
  c.days[todayKey()] = (c.days[todayKey()] || 0) + currentStep;
  save();
  refreshCounter();
  pop();
  spawnRipple(x, y);
  spawnFly(x, y, currentStep);
}

function doUndo() {
  const c = getC(activeId);
  if (!c.hist.length) { snack('Nothing to undo'); return; }
  const prev = c.hist.pop();
  const diff = c.total - prev;
  c.total = prev;
  const tk = todayKey();
  c.days[tk] = Math.max(0, (c.days[tk]||0) - diff);
  if (!c.days[tk]) delete c.days[tk];
  save(); refreshCounter(); pop();
}

function doReset() {
  const c = getC(activeId);
  if (c.total === 0) { snack('Already at 0'); return; }
  c.hist = [];
  const tk = todayKey();
  delete c.days[tk];
  c.total = 0;
  save(); refreshCounter(); pop();
  snack('Counter reset');
}

function pop() {
  const el = document.getElementById('ctrNum');
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function spawnRipple(x, y) {
  const layer = document.getElementById('rippleLayer');
  const size = Math.max(window.innerWidth, window.innerHeight) * 2.4;
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = `width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px`;
  layer.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function spawnFly(x, y, step = 1) {
  const el = document.createElement('div');
  el.className = 'fly';
  el.textContent = `+${step}`;
  el.style.left = (x - 18) + 'px';
  el.style.top  = (y - 18) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ── CALENDAR ──
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function shiftMonth(d) { calDate.setMonth(calDate.getMonth()+d); renderCal(); }

function renderCal() {
  const c = getC(activeId);
  const yr = calDate.getFullYear(), mo = calDate.getMonth();
  document.getElementById('calMonthLabel').textContent = `${MONTHS[mo]} ${yr}`;

  const first = new Date(yr, mo, 1).getDay();
  const days  = new Date(yr, mo+1, 0).getDate();
  const today = todayKey();

  let maxCnt = 0;
  for (let i = 1; i <= days; i++) {
    const k = `${yr}-${pad(mo+1)}-${pad(i)}`;
    maxCnt = Math.max(maxCnt, c.days[k]||0);
  }

  let html = '';
  for (let i = 0; i < first; i++) html += `<div class="cal-cell empty"></div>`;
  for (let i = 1; i <= days; i++) {
    const k = `${yr}-${pad(mo+1)}-${pad(i)}`;
    const cnt = c.days[k]||0;
    const cls = [
      'cal-cell',
      cnt > 0 ? 'has-count' : '',
      k === today ? 'is-today' : '',
      k === calSel ? 'selected' : '',
      cnt > 0 && maxCnt > 0 && cnt >= maxCnt * 0.7 ? 'heat-high' : cnt > 0 && maxCnt > 0 && cnt >= maxCnt * 0.35 ? 'heat-mid' : ''
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="selectDay('${k}',${cnt})">
      <div class="cal-cell-date">${i}</div>
      ${cnt > 0 ? `<div class="cal-cell-count">${cnt}</div>` : ''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  renderDayCard(calSel);
  renderStats();
}

function selectDay(k, cnt) {
  calSel = k;
  renderCal();
}

function renderDayCard(k) {
  const c = getC(activeId);
  const cnt = k ? (c.days[k]||0) : 0;
  const card = document.getElementById('calDayCard');
  if (!k) { card.innerHTML = `<div class="cal-day-empty">Select a day</div>`; return; }
  const [yr,mo,dy] = k.split('-').map(Number);
  const label = new Date(yr,mo-1,dy).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  card.innerHTML = `<div class="cal-day-card-info">
    <div class="cal-day-card-date">${label}</div>
    <div class="cal-day-card-count">${cnt}</div>
    <div class="cal-day-card-label">${cnt===1?'count':'counts'}</div>
  </div>`;
}

function renderStats() {
  const c = getC(activeId);
  const vals = Object.values(c.days).filter(v=>v>0);
  const avg  = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
  const best = vals.length ? Math.max(...vals) : 0;
  const streak = calcStreak(c);
  document.getElementById('calStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Daily Avg</div><div class="stat-val">${avg}</div><div class="stat-sub">active days only</div></div>
    <div class="stat-card"><div class="stat-label">Best Day</div><div class="stat-val">${best}</div><div class="stat-sub">single day</div></div>
    <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-val">${streak}d</div><div class="stat-sub">days in a row</div></div>
    <div class="stat-card"><div class="stat-label">All Time</div><div class="stat-val">${c.total.toLocaleString()}</div><div class="stat-sub">total counts</div></div>
  `;
}

function calcStreak(c) {
  let s = 0, d = new Date();
  while (true) {
    const k = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if ((c.days[k]||0) > 0) { s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}

// ── SHEETS ──
function openNewSheet() {
  document.getElementById('newInput').value = '';
  document.getElementById('newSheet').classList.add('open');
  setTimeout(() => document.getElementById('newInput').focus(), 350);
}

function openRenameSheet() {
  document.getElementById('renameInput').value = getC(activeId).name;
  document.getElementById('renameSheet').classList.add('open');
  setTimeout(() => document.getElementById('renameInput').focus(), 350);
}

function promptDelete(id) {
  pendingDel = id;
  document.getElementById('deleteSheetTitle').textContent = `Delete "${getC(id).name}"?`;
  document.getElementById('deleteSheet').classList.add('open');
}

function closeSheet(id, e) {
  if (e && e.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
}

function createCounter() {
  const name = document.getElementById('newInput').value.trim() || 'Counter';
  db.push({ id: Date.now(), name, total: 0, days: {}, hist: [] });
  save();
  document.getElementById('newSheet').classList.remove('open');
  renderList();
}

function saveRename() {
  const name = document.getElementById('renameInput').value.trim();
  if (!name) return;
  getC(activeId).name = name;
  save();
  document.getElementById('renameSheet').classList.remove('open');
  refreshCounter();
}

function confirmDelete() {
  db = db.filter(c => c.id !== pendingDel);
  save();
  document.getElementById('deleteSheet').classList.remove('open');
  renderList();
}

// Enter keys
document.getElementById('newInput').addEventListener('keydown', e => { if (e.key==='Enter') createCounter(); });
document.getElementById('renameInput').addEventListener('keydown', e => { if (e.key==='Enter') saveRename(); });
document.getElementById('editCountInput').addEventListener('keydown', e => { if (e.key==='Enter') saveEditCount(); });
document.getElementById('customStepInput').addEventListener('keydown', e => { if (e.key==='Enter') saveCustomStep(); });

// ── INIT ──
setView(viewMode);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
