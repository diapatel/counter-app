<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Count It</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --surface: #13121A;
  --surface2: #1C1B26;
  --surface3: #252438;
  --text: #F0EEF8;
  --text-dim: #8B89A8;
  --text-faint: #3D3C52;
  --border: #1E1D2E;
  --border2: #2A293D;
  --safe: env(safe-area-inset-bottom, 0px);

  /* per-counter color — overridden by JS */
  --c: #7C6FCD;
  --c-bright: #A99EE8;
  --c-dim: rgba(124,111,205,0.15);
  --c-glow: rgba(124,111,205,0.25);
  --c-bg: #0E0D18;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: transform 0.34s cubic-bezier(0.4,0,0.2,1), opacity 0.34s;
  will-change: transform;
}
.screen.off-right { transform: translateX(100%); pointer-events: none; }
.screen.off-left  { transform: translateX(-20%); opacity: 0.3; pointer-events: none; }

/* ── ICON BTN ── */
.icon-btn {
  width: 48px; height: 48px; min-width: 48px;
  border-radius: 50%; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); position: relative; overflow: hidden;
  transition: background 0.15s;
}
.icon-btn:active { background: rgba(255,255,255,0.06); }
.icon-btn svg { width: 22px; height: 22px; pointer-events: none; }

/* ══════════ LIST SCREEN ══════════ */
#listScreen { background: var(--bg); }

.list-top {
  padding: 56px 20px 0;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.list-top-title {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.8px;
  color: var(--text);
  line-height: 1;
}
.list-top-right { display: flex; gap: 4px; align-items: center; }

/* view toggle */
.vtoggle {
  display: flex; gap: 2px;
  background: var(--surface);
  border-radius: 12px; padding: 3px;
  border: 1px solid var(--border);
}
.vbtn {
  width: 34px; height: 34px; border-radius: 9px;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-faint); transition: background 0.15s, color 0.15s;
}
.vbtn.on { background: var(--surface3); color: var(--text); }
.vbtn svg { width: 16px; height: 16px; pointer-events: none; }

/* total pill */
.total-pill {
  margin: 16px 20px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.total-pill-label { font-size: 12px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; }
.total-pill-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 400; color: var(--text); letter-spacing: -0.5px; }

/* list scroll */
.list-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.list-scroll::-webkit-scrollbar { display: none; }

/* counter row */
.ctr-row {
  background: var(--surface);
  border-radius: 18px;
  border: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 16px 16px 16px 20px;
  gap: 14px; cursor: pointer; min-height: 76px;
  position: relative; overflow: hidden;
  transition: transform 0.12s, background 0.12s;
}
.ctr-row::before {
  content: '';
  position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; border-radius: 0 2px 2px 0;
  background: var(--c);
  opacity: 0.8;
}
.ctr-row:active { transform: scale(0.982); background: var(--surface2); }
.ctr-row-info { flex: 1; min-width: 0; }
.ctr-row-name { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.3; word-break: break-word; }
.ctr-row-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.today-tag {
  background: var(--c-dim); color: var(--c-bright);
  border-radius: 100px; padding: 2px 8px;
  font-size: 11px; font-weight: 600;
}
.ctr-row-count {
  font-family: 'DM Mono', monospace;
  font-size: 28px; font-weight: 400;
  color: var(--c-bright); letter-spacing: -1px; line-height: 1;
  flex-shrink: 0; min-width: 48px; text-align: right;
}
.ctr-row-del {
  width: 36px; height: 36px; border-radius: 10px;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-faint); flex-shrink: 0;
  transition: color 0.15s, background 0.15s;
}
.ctr-row-del:active { color: #FF6B8A; background: rgba(255,107,138,0.1); }
.ctr-row-del svg { width: 17px; height: 17px; pointer-events: none; }

/* tile grid */
.tile-grid {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 12px 16px 16px;
  overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
}
.tile-grid::-webkit-scrollbar { display: none; }

.ctr-tile {
  background: var(--surface);
  border-radius: 22px;
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 14px 14px; gap: 4px;
  cursor: pointer; min-height: 180px; position: relative; overflow: hidden;
  transition: transform 0.12s, background 0.12s;
}
.ctr-tile::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, var(--c-glow) 0%, transparent 65%);
  pointer-events: none;
}
.ctr-tile:active { transform: scale(0.96); background: var(--surface2); }
.tile-name { font-size: 13px; font-weight: 600; color: var(--text-dim); text-align: center; line-height: 1.3; word-break: break-word; width: 100%; }
.tile-num {
  font-family: 'DM Mono', monospace;
  font-size: clamp(36px, 10vw, 52px); font-weight: 300;
  color: var(--c-bright); letter-spacing: -2px; line-height: 1;
  flex: 1; display: flex; align-items: center; justify-content: center;
  transition: color 0.15s;
}
.tile-today { font-size: 11px; color: var(--text-faint); font-weight: 500; }
.tile-today strong { color: var(--c-bright); }
.tile-btns { display: flex; gap: 6px; width: 100%; margin-top: 6px; }
.tile-btn {
  flex: 1; height: 42px; border-radius: 12px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 300; transition: opacity 0.1s, transform 0.1s;
}
.tile-btn:active { transform: scale(0.9); opacity: 0.7; }
.tile-btn.tm { background: rgba(255,107,138,0.12); color: #FF6B8A; }
.tile-btn.tp { background: var(--c-dim); color: var(--c-bright); }

/* empty state */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--text-faint); padding-bottom: 100px;
}
.empty-state svg { width: 56px; height: 56px; opacity: 0.2; }
.empty-state p { font-size: 15px; font-weight: 500; }

/* FAB */
.fab {
  position: fixed; bottom: calc(72px + var(--safe)); right: 20px;
  width: 60px; height: 60px; border-radius: 18px;
  border: none; background: var(--text); color: var(--bg);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 20;
  transition: transform 0.12s, box-shadow 0.12s;
}
.fab:active { transform: scale(0.92); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.fab svg { width: 26px; height: 26px; }

/* ══════════ COUNTER SCREEN ══════════ */
#counterScreen { background: var(--c-bg); transition: background 0.4s; }

.ctr-top {
  display: flex; align-items: flex-start;
  padding: 52px 6px 0; flex-shrink: 0;
}
.ctr-name-wrap {
  flex: 1; padding: 10px 8px 0; cursor: pointer; min-width: 0;
}
.ctr-name-wrap:active { opacity: 0.6; }
.ctr-name-text { font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.3; word-break: break-word; letter-spacing: -0.3px; }
.ctr-rename-hint { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

/* tap zone */
.tap-zone {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden; cursor: pointer; min-height: 0;
}
.ripple-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
.ripple {
  position: absolute; border-radius: 50%;
  background: var(--c-glow);
  transform: scale(0); animation: rout 0.7s ease-out forwards; pointer-events: none;
}
@keyframes rout { to { transform: scale(1); opacity: 0; } }

/* ambient glow behind number */
.count-glow {
  position: absolute;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--c-glow) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
  transition: background 0.4s;
}

.count-label-txt {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-faint);
  margin-bottom: 8px; z-index: 2;
}
.count-num {
  font-family: 'DM Mono', monospace;
  font-size: clamp(80px, 26vw, 148px); font-weight: 300;
  color: var(--text); line-height: 1; letter-spacing: -4px;
  z-index: 2; cursor: pointer;
  transition: color 0.2s;
}
.count-num.neg { color: #FF6B8A; }
.count-num.pop { animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }

.hold-hint { font-size: 11px; color: var(--text-faint); margin-top: 8px; z-index: 2; }

.today-txt { font-size: 13px; color: var(--text-dim); margin-top: 10px; z-index: 2; }
.today-txt strong { color: var(--c-bright); font-weight: 600; transition: color 0.4s; }

.step-badge {
  margin-top: 8px; z-index: 2;
  background: var(--c-dim); color: var(--c-bright);
  border-radius: 100px; padding: 4px 14px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
  transition: background 0.4s, color 0.4s;
}

.fly {
  position: absolute; font-family: 'DM Mono', monospace;
  font-size: 26px; font-weight: 400; color: var(--c-bright);
  pointer-events: none; z-index: 5;
  animation: flyup 0.6s ease-out forwards;
}
@keyframes flyup { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.6)} }

/* step chips */
.step-row {
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px 10px; flex-shrink: 0;
}
.step-lbl { font-size: 11px; font-weight: 700; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }
.step-chips { display: flex; gap: 6px; flex: 1; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.step-chips::-webkit-scrollbar { display: none; }
.step-chip {
  flex-shrink: 0; height: 32px; padding: 0 14px;
  border-radius: 100px; border: 1.5px solid var(--border2);
  background: transparent; color: var(--text-dim);
  font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.step-chip.on { background: var(--c-dim); border-color: var(--c); color: var(--c-bright); }
.step-chip:active { opacity: 0.7; }

/* action bar */
.action-bar {
  display: flex; align-items: stretch;
  padding: 8px 16px 12px; gap: 8px; flex-shrink: 0;
}
.act-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  padding: 14px 8px; border-radius: 18px;
  border: 1px solid var(--border2); background: var(--surface);
  cursor: pointer; color: var(--text-dim); min-height: 72px;
  transition: background 0.12s, color 0.12s, transform 0.1s;
}
.act-btn:active { background: var(--surface2); color: var(--text); transform: scale(0.95); }
.act-btn svg { width: 20px; height: 20px; }
.act-btn span { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
.act-btn.primary {
  background: var(--c); color: #fff; border-color: transparent; flex: 1.5;
  box-shadow: 0 4px 20px var(--c-glow);
  transition: background 0.4s, box-shadow 0.4s, transform 0.1s;
}
.act-btn.primary:active { opacity: 0.85; transform: scale(0.95); }

/* ══════════ CALENDAR SCREEN ══════════ */
#calendarScreen { background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; }
#calendarScreen::-webkit-scrollbar { display: none; }

.cal-top { display: flex; align-items: flex-start; padding: 52px 6px 0; flex-shrink: 0; }
.cal-title-wrap { flex: 1; padding: 8px 8px 0; }
.cal-ctr-name { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.3; word-break: break-word; letter-spacing: -0.3px; }
.cal-sub { font-size: 12px; color: var(--text-faint); margin-top: 3px; }

.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; }
.cal-month { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.cal-nav-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
.cal-nav-btn:active { background: var(--surface2); }
.cal-nav-btn svg { width: 20px; height: 20px; }

.cal-dow { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 12px; }
.dow-cell { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-faint); padding: 6px 0; letter-spacing: 0.8px; }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; padding: 4px 12px 0; }
.cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; gap: 2px; transition: background 0.12s; }
.cal-cell:active { background: var(--surface2); }
.cal-cell.mt0 { pointer-events: none; }
.cell-date { font-size: 13px; color: var(--text-dim); line-height: 1; font-weight: 400; }
.cal-cell.has-data .cell-date { color: var(--text); font-weight: 600; }
.cal-cell.is-today .cell-date { background: var(--c); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: background 0.4s; }
.cell-cnt { font-size: 9px; font-weight: 700; color: var(--c-bright); line-height: 1; transition: color 0.4s; }
.cal-cell.heat1 { background: rgba(var(--cr),0.06); }
.cal-cell.heat2 { background: rgba(var(--cr),0.14); }
.cal-cell.heat3 { background: rgba(var(--cr),0.24); }
.cal-cell.sel { outline: 2px solid var(--c); outline-offset: 0; border-radius: 12px; }

.day-card { margin: 14px 14px 0; background: var(--surface); border-radius: 20px; padding: 18px 20px; border: 1px solid var(--border); min-height: 80px; display: flex; align-items: center; }
.day-card-info { flex: 1; }
.day-card-date { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
.day-card-num { font-family: 'DM Mono', monospace; font-size: 48px; font-weight: 300; color: var(--c-bright); letter-spacing: -2px; line-height: 1; transition: color 0.4s; }
.day-card-lbl { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
.day-card-empty { font-size: 15px; color: var(--text-faint); }

.cal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 14px 16px; }
.stat { background: var(--surface); border-radius: 18px; padding: 16px 18px; border: 1px solid var(--border); }
.stat-lbl { font-size: 10px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
.stat-val { font-family: 'DM Mono', monospace; font-size: 30px; font-weight: 300; color: var(--text); letter-spacing: -0.5px; line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text-faint); margin-top: 4px; }

/* ══════════ SHEETS ══════════ */
.backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 60; display: flex; align-items: flex-end; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
.backdrop.open { opacity: 1; pointer-events: all; }
.sheet { background: #111019; border-radius: 28px 28px 0 0; padding: 18px 20px calc(24px + var(--safe)); width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); border-top: 1px solid var(--border2); }
.backdrop.open .sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 16px; letter-spacing: -0.3px; }
.sheet-input {
  width: 100%; background: var(--surface2);
  border: 1.5px solid var(--border2); border-radius: 14px;
  padding: 15px 18px; font-size: 17px; color: var(--text);
  font-family: 'DM Sans', sans-serif; outline: none;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.sheet-input:focus { border-color: var(--c); }
.sheet-input::placeholder { color: var(--text-faint); }
.sheet-actions { display: flex; gap: 10px; margin-top: 14px; }
.sheet-btn { flex: 1; padding: 16px; border-radius: 100px; border: none; cursor: pointer; font-size: 16px; font-weight: 700; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s, transform 0.1s; }
.sheet-btn:active { opacity: 0.8; transform: scale(0.97); }
.sheet-btn.cancel { background: var(--surface2); color: var(--text-dim); }
.sheet-btn.confirm { background: var(--c); color: #fff; transition: background 0.4s; }
.sheet-btn.danger  { background: #FF6B8A; color: #fff; }
.sheet-danger-text { font-size: 14px; color: var(--text-dim); line-height: 1.5; margin-bottom: 4px; }

/* color picker in new counter sheet */
.color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.color-swatch {
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent;
  transition: transform 0.12s, border-color 0.12s;
}
.color-swatch:active { transform: scale(0.88); }
.color-swatch.picked { border-color: var(--text); }

/* ── COUNT TABS ── */
.count-tabs {
  display: flex;
  gap: 0;
  padding: 0 20px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.count-tab {
  flex: 1;
  padding: 12px 0;
  border: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-faint);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  transition: color 0.15s;
}
.count-tab.active {
  color: var(--c-bright);
}
.count-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 20%; right: 20%;
  height: 2px;
  background: var(--c-bright);
  border-radius: 2px;
  transition: background 0.4s;
}

/* ── AD BANNER SPACE ── */
.ad-banner {
  height: 60px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  border-top: 1px solid var(--border);
  margin-bottom: var(--safe);
  color: var(--text-faint);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* snack */
.snack { position: fixed; bottom: calc(88px + var(--safe)); left: 50%; transform: translateX(-50%) translateY(16px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 500; color: var(--text-dim); white-space: nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 55; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
.snack.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ LIST SCREEN ══ -->
<div class="screen" id="listScreen">
  <div class="list-top">
    <div class="list-top-title">Count It</div>
    <div class="list-top-right">
      <div class="vtoggle">
        <button class="vbtn on" id="vList" onclick="setView('list')" title="List">

        </button>
        <button class="vbtn" id="vGrid" onclick="setView('grid')" title="Grid">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>

  <div class="total-pill" id="totalPill"></div>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

      <span>Undo</span>

    <button class="act-btn primary" id="tapBtn" onclick="doTap(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Count</span>

      <span>Reset</span>

    <button class="act-btn" onclick="recalcTotal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>

<script>
// ── COLORS ──
const PALETTE = [
  // dark backgrounds — light text
  { bg: '#1A0533', text: '#F0EEF8', num: '#D4BAFF', dim: '#9B7FC2', name: 'Deep Purple',  r:'130,80,200' },
  { bg: '#0A1628', text: '#F0EEF8', num: '#7EB8F7', dim: '#4A7AAF', name: 'Midnight Blue', r:'70,140,220' },
  { bg: '#0D2018', text: '#F0EEF8', num: '#6DEBA0', dim: '#3A8A5A', name: 'Forest',        r:'60,180,100' },
  { bg: '#1A0A0A', text: '#F0EEF8', num: '#F28A8A', dim: '#A84040', name: 'Crimson Night', r:'210,80,80'  },
  { bg: '#0F0F1A', text: '#F0EEF8', num: '#A0C4FF', dim: '#506080', name: 'Slate',         r:'100,140,210'},
  { bg: '#1A1200', text: '#F0EEF8', num: '#FFD97D', dim: '#A07A00', name: 'Midnight Gold',  r:'210,170,50'},
  { bg: '#120A1A', text: '#F0EEF8', num: '#E88AF2', dim: '#8A3A9A', name: 'Galaxy',        r:'180,80,210' },
  { bg: '#001A18', text: '#F0EEF8', num: '#5AECD8', dim: '#1A8A7A', name: 'Deep Teal',     r:'50,180,170' },
  // vivid backgrounds — dark text
  { bg: '#FFD6E0', text: '#1A0A10', num: '#C0003A', dim: '#800028', name: 'Rose',          r:'255,100,140'},
  { bg: '#D6EAFF', text: '#040F1A', num: '#005BB5', dim: '#003A80', name: 'Sky',           r:'80,160,240' },
  { bg: '#D6FFE8', text: '#041A0C', num: '#007A38', dim: '#004A20', name: 'Mint',          r:'60,200,120' },
  { bg: '#FFF3D6', text: '#1A0F00', num: '#A06000', dim: '#704000', name: 'Honey',         r:'240,180,60' },
  { bg: '#EDD6FF', text: '#0F0018', num: '#7000C0', dim: '#4A0080', name: 'Lavender',      r:'160,80,220' },
  { bg: '#FFE8D6', text: '#1A0800', num: '#C05000', dim: '#803000', name: 'Peach',         r:'240,130,60' },
  { bg: '#D6FFF8', text: '#001A14', num: '#007A6A', dim: '#004A40', name: 'Aqua',          r:'50,200,180' },
  { bg: '#F5F5F5', text: '#111111', num: '#333333', dim: '#777777', name: 'White',         r:'100,100,100'},
];

// ── DATA ──
const KEY = 'countit_v1';
function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
function save() { localStorage.setItem(KEY, JSON.stringify(db)); }
function todayKey() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let db = load();
if (!db.length) {
  db = [{ id: Date.now(), name: 'My Counter', total: 0, days: {}, hist: [], colorIdx: 0 }];
  save();
}

let activeId = null;
let currentStep = 1;
let activeTab = 'total';
let viewMode = localStorage.getItem('vm') || 'list';
let calDate = new Date();
let calSel = null;
let pendingDel = null;
let pickedColor = 0;
let snackTid;

// ── COLOR UTILS ──
function getColor(idx) { return PALETTE[idx % PALETTE.length]; }
function applyColor(idx) {
  const col = getColor(idx);
  const r = document.documentElement;
  r.style.setProperty('--c', col.num);
  r.style.setProperty('--c-bright', col.num);
  r.style.setProperty('--c-dim', `rgba(${col.r},0.18)`);
  r.style.setProperty('--c-glow', `rgba(${col.r},0.25)`);
  r.style.setProperty('--c-bg', col.bg);
  r.style.setProperty('--cr', col.r);
  // full background color
  const screen = document.getElementById('counterScreen');
  screen.style.background = col.bg;
  // adapt text colors for light vs dark backgrounds
  screen.style.setProperty('--text', col.text);
  screen.style.color = col.text;
  // update icon buttons and labels
  screen.querySelectorAll('.icon-btn, .count-label-txt, .hold-hint, .step-lbl, .ctr-rename-hint, .count-tab').forEach(el => {
    el.style.color = col.dim;
  });
  screen.querySelectorAll('.count-tab.active').forEach(el => el.style.color = col.num);
  screen.querySelectorAll('.ctr-name-text, .today-txt').forEach(el => el.style.color = col.text);
  // action bar and step chips adapt
  screen.querySelectorAll('.act-btn:not(.primary)').forEach(el => {
    el.style.background = `rgba(${col.r},0.12)`;
    el.style.borderColor = `rgba(${col.r},0.2)`;
    el.style.color = col.text;
  });
  screen.querySelectorAll('.step-chip').forEach(el => {
    el.style.borderColor = `rgba(${col.r},0.25)`;
    el.style.color = col.dim;
  });
  screen.querySelectorAll('.step-chip.on').forEach(el => {
    el.style.background = `rgba(${col.r},0.2)`;
    el.style.borderColor = col.num;
    el.style.color = col.num;
  });
  // primary button uses num color as background
  const primary = screen.querySelector('.act-btn.primary');
  if (primary) { primary.style.background = col.num; primary.style.color = col.bg; }
  // count tabs border
  screen.querySelector('.count-tabs').style.borderBottomColor = `rgba(${col.r},0.2)`;
  // ad banner
  screen.querySelector('.ad-banner').style.background = `rgba(${col.r},0.08)`;
  screen.querySelector('.ad-banner').style.borderTopColor = `rgba(${col.r},0.15)`;
  screen.querySelector('.ad-banner').style.color = col.dim;
}

// ── NAVIGATION ──
let stack = ['listScreen'];
function navTo(id) {
  const cur = stack[stack.length-1];
  document.getElementById(cur).classList.add('off-left');
  document.getElementById(id).classList.remove('off-right','off-left');
  stack.push(id);
}
function navBack() {
  if (stack.length <= 1) return;
  const cur = stack.pop();
  document.getElementById(cur).classList.add('off-right');
  document.getElementById(cur).classList.remove('off-left');
  const prev = stack[stack.length-1];
  document.getElementById(prev).classList.remove('off-left','off-right');
  if (prev === 'listScreen') renderAll();
  if (prev === 'counterScreen') refreshCtr();
}
function navCal() {
  const c = getC(activeId);
  document.getElementById('calName').textContent = c.name;
  calDate = new Date(); calSel = todayKey();
  renderCal();
  navTo('calendarScreen');
}

// ── UTILS ──
function getC(id) { return db.find(c => c.id === id); }
function todayOf(c) { return c.days[todayKey()] || 0; }
function snack(msg) {
  const el = document.getElementById('snack');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(snackTid);
  snackTid = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── VIEW ──
function setView(mode) {
  viewMode = mode;
  localStorage.setItem('vm', mode);
  document.getElementById('vList').classList.toggle('on', mode === 'list');
  document.getElementById('vGrid').classList.toggle('on', mode === 'grid');
  document.getElementById('listScroll').style.display = mode === 'list' ? 'flex' : 'none';
  document.getElementById('tileGrid').style.display   = mode === 'grid' ? 'grid' : 'none';
  renderAll();
}

function renderAll() {
  renderTotalPill();
  if (viewMode === 'list') renderList();
  else renderTiles();
}

function renderTotalPill() {
  const total = db.reduce((a,c) => a + c.total, 0);
  const today = db.reduce((a,c) => a + todayOf(c), 0);
  document.getElementById('totalPill').innerHTML =
    `<span class="total-pill-label">All counters</span>
     <span class="total-pill-val">${total.toLocaleString()} total · ${today} today</span>`;
}

// ── LIST ──
function renderList() {
  const el = document.getElementById('listScroll');
  if (!db.length) { el.innerHTML = emptyHTML(); return; }
  el.innerHTML = db.map(c => {
    const col = getColor(c.colorIdx || 0);
    const today = todayOf(c);
    return `<div class="ctr-row" onclick="openCounter(${c.id})"
      style="--c:${col.num};--c-bright:${col.num};--c-dim:rgba(${col.r},0.15)">
      <div class="ctr-row-info">
        <div class="ctr-row-name">${esc(c.name)}</div>
        <div class="ctr-row-meta">
          <span>All time: ${c.total.toLocaleString()}</span>
          ${today > 0 ? `<span class="today-tag">Today: ${today}</span>` : ''}
        </div>
      </div>
      <div class="ctr-row-count">${c.total.toLocaleString()}</div>
      <button class="ctr-row-del" onclick="event.stopPropagation();promptDel(${c.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`;
  }).join('');
}

// ── TILES ──
function renderTiles() {
  const el = document.getElementById('tileGrid');
  if (!db.length) { el.innerHTML = emptyHTML(); el.style.display='flex'; el.style.flexDirection='column'; el.style.alignItems='center'; el.style.justifyContent='center'; return; }
  el.style.display='grid'; el.style.flexDirection='';
  el.innerHTML = db.map(c => {
    const col = getColor(c.colorIdx || 0);
    const today = todayOf(c);
    return `<div class="ctr-tile" onclick="openCounter(${c.id})"
      style="background:${col.bg};--c:${col.num};--c-bright:${col.num};--c-dim:rgba(${col.r},0.18);--c-glow:rgba(${col.r},0.2);color:${col.text}">
      <div class="tile-name" style="color:${col.dim}">${esc(c.name)}</div>
      <div class="tile-num" id="tn-${c.id}" style="color:${col.num}">${c.total.toLocaleString()}</div>
      <div class="tile-today" id="tt-${c.id}" style="color:${col.dim}">${today > 0 ? `Today: <strong style="color:${col.num}">${today}</strong>` : '&nbsp;'}</div>
      <div class="tile-btns">
        <button class="tile-btn tm" style="background:rgba(${col.r},0.15);color:${col.num}" onclick="event.stopPropagation();tileDec(${c.id})">−</button>
        <button class="tile-btn tp" style="background:rgba(${col.r},0.25);color:${col.num}" onclick="event.stopPropagation();tileInc(${c.id})">+</button>
      </div>
    </div>`;
  }).join('');
}

function tileInc(id) {
  const c = getC(id); c.hist.push(c.total); c.total++; c.days[todayKey()]=(c.days[todayKey()]||0)+1; save();
  const col = getColor(c.colorIdx||0);
  const el = document.getElementById(`tn-${id}`); el.textContent = c.total.toLocaleString(); el.style.color='#fff'; setTimeout(()=>el.style.color='',180);
  const te = document.getElementById(`tt-${id}`); const t=todayOf(c); te.innerHTML = t>0?`Today: <strong>${t}</strong>`:'&nbsp;';
  renderTotalPill();
}
function tileDec(id) {
  const c = getC(id); c.hist.push(c.total); c.total--; const tk=todayKey(); c.days[tk]=Math.max(0,(c.days[tk]||0)-1); if(!c.days[tk])delete c.days[tk]; save();
  const el = document.getElementById(`tn-${id}`); el.textContent = c.total.toLocaleString(); el.style.color='#FF6B8A'; setTimeout(()=>el.style.color='',180);
  const te = document.getElementById(`tt-${id}`); const t=todayOf(c); te.innerHTML = t>0?`Today: <strong>${t}</strong>`:'&nbsp;';
  renderTotalPill();
}

function emptyHTML() { return `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><p>Tap + to add a counter</p></div>`; }

// ── TABS ──
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabTotal').classList.toggle('active', tab === 'total');
  document.getElementById('tabToday').classList.toggle('active', tab === 'today');
  refreshCtr();
}

// ── OPEN COUNTER ──
function openCounter(id) {
  activeId = id;
  activeTab = 'total';
  currentStep = 1;
  document.getElementById('tabTotal').classList.add('active');
  document.getElementById('tabToday').classList.remove('active');
  document.querySelectorAll('.step-chip').forEach((c,i) => { c.classList.toggle('on', i===0); });
  document.getElementById('customChip').textContent = 'Custom…';
  document.getElementById('customChip').onclick = openCustomStepSheet;
  document.getElementById('stepBadge').textContent = '+1 per tap';
  const c = getC(id);
  applyColor(c.colorIdx || 0);
  refreshCtr();
  navTo('counterScreen');
  setupTap();
}

function refreshCtr() {
  const c = getC(activeId); if (!c) return;
  document.getElementById('ctrName').textContent = c.name;
  const val = activeTab === 'total' ? c.total : todayOf(c);
  const el = document.getElementById('ctrNum');
  el.textContent = val.toLocaleString();
  el.classList.toggle('neg', val < 0);
  document.getElementById('ctrLabel').textContent = activeTab === 'total' ? 'TOTAL' : 'TODAY';
}

// ── TAP ──
function setupTap() {
  const zone = document.getElementById('tapZone');
  const numEl = document.getElementById('ctrNum');
  let pressTimer = null, didLong = false;

  // Long press on number = edit
  numEl.ontouchstart = e => {
    didLong = false;
    pressTimer = setTimeout(() => {
      didLong = true;
      if (navigator.vibrate) navigator.vibrate(40);
      openEditSheet();
    }, 480);
  };
  numEl.ontouchend = e => {
    clearTimeout(pressTimer);
    // short tap on number = increment just like anywhere else
    if (!didLong) {
      e.preventDefault(); e.stopPropagation();
      const t = e.changedTouches[0];
      doIncrement(t.clientX, t.clientY);
    }
  };
  numEl.ontouchmove = () => clearTimeout(pressTimer);

  // desktop: long mousedown = edit, short click = increment
  numEl.onmousedown = () => { didLong=false; pressTimer=setTimeout(()=>{didLong=true;openEditSheet();},480); };
  numEl.onmouseup = () => clearTimeout(pressTimer);
  numEl.onclick = e => { if (didLong) { e.stopPropagation(); return; } doIncrement(e.clientX, e.clientY); };

  // rest of zone = increment too
  zone.onclick = e => { if (e.target===numEl || (e.target.closest && e.target.closest('#ctrNum'))) return; if (!e.target.closest('button')) doIncrement(e.clientX, e.clientY); };
  zone.ontouchend = e => {
    if (e.target===numEl || (e.target.closest && e.target.closest('#ctrNum'))) return;
    e.preventDefault();
    if (!e.target.closest('button')) { const t=e.changedTouches[0]; doIncrement(t.clientX, t.clientY); }
  };
}

function doTap(e) { const r=e.currentTarget.getBoundingClientRect(); doIncrement(r.left+r.width/2, r.top+r.height/2); }

function doIncrement(x, y) {
  const c = getC(activeId);
  c.hist.push(c.total); if(c.hist.length>200) c.hist.shift();
  c.total += currentStep;
  c.days[todayKey()] = (c.days[todayKey()]||0) + currentStep;
  save(); refreshCtr(); popNum(); spawnRipple(x,y); spawnFly(x,y,currentStep);
}

function doUndo() {
  const c = getC(activeId);
  if (!c.hist.length) { snack('Nothing to undo'); return; }
  const prev = c.hist.pop(); const diff = c.total - prev;
  c.total = prev; const tk=todayKey();
  c.days[tk] = Math.max(0,(c.days[tk]||0)-diff);
  if(!c.days[tk]) delete c.days[tk];
  save(); refreshCtr(); popNum();
}

function doReset() {
  const c = getC(activeId);
  const todayCount = todayOf(c);
  if (todayCount === 0) { snack("Nothing to reset today"); return; }
  c.hist.push(c.total);
  c.total = c.total - todayCount;
  delete c.days[todayKey()];
  save(); refreshCtr(); popNum();
  snack(`Today's count reset`);
}

function recalcTotal() {
  const c = getC(activeId);
  const realTotal = Object.values(c.days).reduce((a, b) => a + b, 0);
  c.hist.push(c.total);
  c.total = realTotal;
  save(); refreshCtr(); popNum();
  snack(`Total recalculated to ${realTotal.toLocaleString()}`);
}

function popNum() {
  const el=document.getElementById('ctrNum');
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

function spawnRipple(x,y) {
  const l=document.getElementById('rippleLayer');
  const s=Math.max(window.innerWidth,window.innerHeight)*2.4;
  const r=document.createElement('div'); r.className='ripple';
  r.style.cssText=`width:${s}px;height:${s}px;left:${x-s/2}px;top:${y-s/2}px`;
  l.appendChild(r); r.addEventListener('animationend',()=>r.remove());
}

function spawnFly(x,y,step=1) {
  const el=document.createElement('div'); el.className='fly';
  el.textContent=`+${step}`; el.style.left=(x-18)+'px'; el.style.top=(y-18)+'px';
  document.body.appendChild(el); el.addEventListener('animationend',()=>el.remove());
}

// ── STEP ──
function setStep(n, btn) {
  currentStep = n;
  document.querySelectorAll('.step-chip').forEach(c=>c.classList.remove('on'));
  if(btn) btn.classList.add('on');
  document.getElementById('stepBadge').textContent = `+${n} per tap`;
}

function openCustomStepSheet() {
  document.getElementById('customStepInput').value='';
  document.getElementById('customStepSheet').classList.add('open');
  setTimeout(()=>document.getElementById('customStepInput').focus(),350);
}

function saveCustomStep() {
  const v=parseInt(document.getElementById('customStepInput').value);
  if(!v||v<1){snack('Enter a valid number');return;}
  currentStep=v;
  document.querySelectorAll('.step-chip').forEach(c=>c.classList.remove('on'));
  const cc=document.getElementById('customChip');
  cc.textContent=v; cc.classList.add('on'); cc.onclick=()=>setStep(v,cc);
  document.getElementById('stepBadge').textContent=`+${v} per tap`;
  closeSheet('customStepSheet');
}

// ── EDIT COUNT ──
function openEditSheet() {
  const c = getC(activeId);
  const val = activeTab === 'total' ? c.total : todayOf(c);
  document.getElementById('editInput').value = val;
  document.getElementById('editCountSheet').classList.add('open');
  setTimeout(()=>{const i=document.getElementById('editInput');i.focus();i.select();},350);
}

function saveEdit() {
  const v = parseInt(document.getElementById('editInput').value);
  if (isNaN(v)) { snack('Enter a valid number'); return; }
  const c = getC(activeId);
  c.hist.push(c.total);
  if (activeTab === 'total') {
    // editing total: adjust today proportionally
    const diff = v - c.total;
    c.total = v;
    const tk = todayKey();
    c.days[tk] = Math.max(0, (c.days[tk] || 0) + diff);
  } else {
    // editing today: adjust total by the difference
    const tk = todayKey();
    const oldToday = c.days[tk] || 0;
    const diff = v - oldToday;
    c.days[tk] = Math.max(0, v);
    c.total = c.total + diff;
  }
  save(); refreshCtr(); popNum();
  closeSheet('editCountSheet');
  snack(`${activeTab === 'total' ? 'Total' : 'Today'} set to ${v.toLocaleString()}`);
}

// ── CALENDAR ──
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function shiftMonth(d){calDate.setMonth(calDate.getMonth()+d);renderCal();}

function renderCal() {
  const c=getC(activeId);
  const yr=calDate.getFullYear(), mo=calDate.getMonth();
  document.getElementById('calMonth').textContent=`${MONTHS[mo]} ${yr}`;
  const first=new Date(yr,mo,1).getDay(), days=new Date(yr,mo+1,0).getDate();
  const today=todayKey();
  let mx=0;
  for(let i=1;i<=days;i++){const k=`${yr}-${pad(mo+1)}-${pad(i)}`;mx=Math.max(mx,c.days[k]||0);}
  let html='';
  for(let i=0;i<first;i++) html+=`<div class="cal-cell mt0"></div>`;
  for(let i=1;i<=days;i++){
    const k=`${yr}-${pad(mo+1)}-${pad(i)}`;
    const cnt=c.days[k]||0;
    const heat=cnt>0&&mx>0?(cnt>=mx*0.7?'heat3':cnt>=mx*0.35?'heat2':'heat1'):'';
    const cls=['cal-cell',cnt>0?'has-data':'',k===today?'is-today':'',k===calSel?'sel':'',heat].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="selDay('${k}')">
      <div class="cell-date">${i}</div>
      ${cnt>0?`<div class="cell-cnt">${cnt}</div>`:''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderDayCard(); renderCalStats();
}

function selDay(k){calSel=k;renderCal();}

function renderDayCard(){
  const c=getC(activeId); const cnt=calSel?(c.days[calSel]||0):0;
  const card=document.getElementById('dayCard');
  if(!calSel){card.innerHTML=`<div class="day-card-empty">Select a day</div>`;return;}
  const[yr,mo,dy]=calSel.split('-').map(Number);
  const lbl=new Date(yr,mo-1,dy).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  card.innerHTML=`<div class="day-card-info"><div class="day-card-date">${lbl}</div><div class="day-card-num">${cnt}</div><div class="day-card-lbl">${cnt===1?'count':'counts'}</div></div>`;
}

function renderCalStats(){
  const c=getC(activeId);
  const vals=Object.values(c.days).filter(v=>v>0);
  const avg=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  const best=vals.length?Math.max(...vals):0;
  const streak=calcStreak(c);
  document.getElementById('calStats').innerHTML=`
    <div class="stat"><div class="stat-lbl">Daily Avg</div><div class="stat-val">${avg}</div><div class="stat-sub">active days</div></div>
    <div class="stat"><div class="stat-lbl">Best Day</div><div class="stat-val">${best}</div><div class="stat-sub">single day</div></div>
    <div class="stat"><div class="stat-lbl">Streak</div><div class="stat-val">${streak}d</div><div class="stat-sub">in a row</div></div>
    <div class="stat"><div class="stat-lbl">All Time</div><div class="stat-val">${c.total.toLocaleString()}</div><div class="stat-sub">total</div></div>`;
}

function calcStreak(c){let s=0,d=new Date();while(true){const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;if((c.days[k]||0)>0){s++;d.setDate(d.getDate()-1);}else break;}return s;}

// ── SHEETS ──
function buildColorRow(){
  const el=document.getElementById('colorRow');
  el.innerHTML=PALETTE.map((col,i)=>`
    <div class="color-swatch${i===pickedColor?' picked':''}" 
      style="background:${col.bg};border:3px solid ${i===pickedColor?col.num:'transparent'};box-shadow:inset 0 0 0 1px rgba(255,255,255,0.1)" 
      title="${col.name}"
      onclick="pickColor(${i})">
    </div>`).join('');
  document.getElementById('newConfirmBtn').style.background=PALETTE[pickedColor].num;
  document.getElementById('newConfirmBtn').style.color=PALETTE[pickedColor].bg;
}

function pickColor(i){
  pickedColor=i;
  buildColorRow();
}

function openNewSheet(){
  pickedColor=db.length % PALETTE.length;
  buildColorRow();
  document.getElementById('newInput').value='';
  document.getElementById('newSheet').classList.add('open');
  setTimeout(()=>document.getElementById('newInput').focus(),350);
}

function openRenameSheet(){
  document.getElementById('renameInput').value=getC(activeId).name;
  document.getElementById('renameSheet').classList.add('open');
  setTimeout(()=>document.getElementById('renameInput').focus(),350);
}

function promptDel(id){
  pendingDel=id;
  document.getElementById('delTitle').textContent=`Delete "${getC(id).name}"?`;
  document.getElementById('deleteSheet').classList.add('open');
}

function closeSheet(id,e){if(e&&e.target!==document.getElementById(id))return;document.getElementById(id).classList.remove('open');}

function createCounter(){
  const name=document.getElementById('newInput').value.trim()||'Counter';
  db.push({id:Date.now(),name,total:0,days:{},hist:[],colorIdx:pickedColor});
  save(); closeSheet('newSheet'); renderAll();
}

function saveRename(){
  const name=document.getElementById('renameInput').value.trim(); if(!name) return;
  getC(activeId).name=name; save(); refreshCtr();
  closeSheet('renameSheet');
}

function confirmDelete(){
  db=db.filter(c=>c.id!==pendingDel); save();
  closeSheet('deleteSheet'); renderAll();
}

// enter keys
['newInput,createCounter','renameInput,saveRename','editInput,saveEdit','customStepInput,saveCustomStep'].forEach(pair=>{
  const[id,fn]=pair.split(',');
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')window[fn]();});
});

// ── INIT ──
setView(viewMode);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
